<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aero-cfd-wasm — LBM flow over a NACA airfoil</title>
    <style>
      :root {
        --base: #0b0f12;
        --cyan: #3fc8d4;
        --amber: #f0a93b;
        --text: #cfe3e6;
      }
      body {
        margin: 0;
        background: var(--base);
        color: var(--text);
        font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 16px;
      }
      h1 { font-size: 16px; font-weight: 600; color: var(--cyan); margin: 4px 0; }
      canvas { border: 1px solid #1c2529; image-rendering: pixelated; width: 800px; height: 400px; }
      .controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; max-width: 800px; }
      .ctl { display: flex; flex-direction: column; gap: 2px; }
      label { color: #8aa3a7; font-size: 12px; }
      select, button { background: #141b1f; color: var(--text); border: 1px solid #2e3a3f; padding: 4px 8px; font: inherit; }
      button { cursor: pointer; }
      button:hover { border-color: var(--cyan); }
      input[type="range"] { accent-color: var(--cyan); width: 140px; }
      .val { color: var(--amber); }
    </style>
  </head>
  <body>
    <h1>LBM D2Q9 — flow over a NACA0012 · NACA0012 주위 유동 (weakly-compressible, Ma &lt; 0.3)</h1>
    <canvas id="view" width="800" height="400"></canvas>
    <div class="controls">
      <div class="ctl">
        <label for="field">field · 필드</label>
        <select id="field">
          <option value="vorticity">vorticity · 와도</option>
          <option value="speed">speed |u| · 속력</option>
          <option value="density">density · 밀도 (≈ pressure 압력)</option>
        </select>
      </div>
      <div class="ctl">
        <label for="aoa">AoA · 받음각 <span class="val" id="aoaVal">8°</span></label>
        <input type="range" id="aoa" min="-15" max="15" step="1" value="8" />
      </div>
      <div class="ctl">
        <label for="re">Reynolds · 레이놀즈수 <span class="val" id="reVal">200</span></label>
        <input type="range" id="re" min="50" max="1000" step="10" value="200" />
      </div>
      <div class="ctl">
        <label for="uin">flow speed · 유속 <span class="val" id="uinVal">0.100</span> <span id="maVal" style="color:#8aa3a7"></span></label>
        <input type="range" id="uin" min="0.02" max="0.15" step="0.005" value="0.1" />
      </div>
      <div class="ctl">
        <label for="chord">chord · 시위 <span class="val" id="chordVal">60</span></label>
        <input type="range" id="chord" min="30" max="120" step="5" value="60" />
      </div>
      <div class="ctl">
        <label for="thick">thickness · 두께 <span class="val" id="thickVal">0.12</span></label>
        <input type="range" id="thick" min="0.06" max="0.30" step="0.01" value="0.12" />
      </div>
      <div class="ctl">
        <label>&nbsp;</label>
        <button id="playpause">pause · 정지</button>
      </div>
      <div class="ctl">
        <label>&nbsp;</label>
        <button id="reset">reset · 초기화</button>
      </div>
    </div>
    <script type="module" src="./render.js"></script>
  </body>
</html>
