<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aero-cfd-wasm — LBM flow over a NACA airfoil</title>
    <style>
      :root {
        --base: #0b0f12;
        --cyan: #3fc8d4;
        --amber: #f0a93b;
        --text: #cfe3e6;
      }
      body {
        margin: 0;
        background: var(--base);
        color: var(--text);
        font: 14px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 16px;
      }
      h1 { font-size: 16px; font-weight: 600; color: var(--cyan); margin: 4px 0; }
      canvas { border: 1px solid #1c2529; image-rendering: pixelated; width: 800px; height: 400px; }
      .controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; max-width: 800px; }
      .ctl { display: flex; flex-direction: column; gap: 2px; }
      label { color: #8aa3a7; font-size: 12px; }
      select, button { background: #141b1f; color: var(--text); border: 1px solid #2e3a3f; padding: 4px 8px; font: inherit; }
      button { cursor: pointer; }
      button:hover { border-color: var(--cyan); }
      input[type="range"] { accent-color: var(--cyan); width: 140px; }
      .val { color: var(--amber); }
    </style>
  </head>
  <body>
    <h1>LBM D2Q9 — flow over a NACA0012 (weakly-compressible, Ma &lt; 0.3)</h1>
    <canvas id="view" width="800" height="400"></canvas>
    <div class="controls">
      <div class="ctl">
        <label for="field">field</label>
        <select id="field">
          <option value="vorticity">vorticity</option>
          <option value="speed">speed |u|</option>
          <option value="density">density (≈ pressure)</option>
        </select>
      </div>
      <div class="ctl">
        <label for="aoa">AoA <span class="val" id="aoaVal">8°</span></label>
        <input type="range" id="aoa" min="-15" max="15" step="1" value="8" />
      </div>
      <div class="ctl">
        <label for="re">Reynolds <span class="val" id="reVal">200</span></label>
        <input type="range" id="re" min="50" max="1000" step="10" value="200" />
      </div>
      <div class="ctl">
        <label>&nbsp;</label>
        <button id="playpause">pause</button>
      </div>
      <div class="ctl">
        <label>&nbsp;</label>
        <button id="reset">reset</button>
      </div>
    </div>
    <script type="module" src="./render.js"></script>
  </body>
</html>
